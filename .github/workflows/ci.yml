name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install Node deps
        run: pnpm install
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
      - name: Sync Python workspace
        run: uv --cache-dir ./.uv-cache sync --project . --all-packages --all-groups --locked
      - name: Check repo version consistency
        run: pnpm version:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test
