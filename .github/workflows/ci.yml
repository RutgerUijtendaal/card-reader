name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Node deps
        run: pnpm install
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
      - name: Install Core deps
        run: uv sync --project services/core --extra dev
      - name: Install API deps
        run: uv sync --project services/api --extra dev
      - name: Install parser deps
        run: uv sync --project services/parser --extra dev
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test
      - name: Build (excluding desktop bundle)
        run: pnpm exec turbo run build --filter=!@card-reader/desktop
