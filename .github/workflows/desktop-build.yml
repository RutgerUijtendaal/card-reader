name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  desktop:
    name: Desktop (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            os: windows-latest
            bundles: nsis
            artifact_name: windows-desktop-bundle
            artifact_paths: |
              apps/desktop/src-tauri/target/release/bundle/nsis/*
              apps/desktop/src-tauri/target/release/*.exe
          - name: linux
            os: ubuntu-22.04
            bundles: appimage,deb
            artifact_name: linux-desktop-bundle
            artifact_paths: |
              apps/desktop/src-tauri/target/release/bundle/appimage/*
              apps/desktop/src-tauri/target/release/bundle/deb/*

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop sidecars
        run: pnpm --filter @card-reader/desktop run build:sidecars

      - name: Build desktop bundle
        run: pnpm --filter @card-reader/desktop exec tauri build --bundles ${{ matrix.platform.bundles }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_paths }}
