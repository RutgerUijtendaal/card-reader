name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            os: windows-latest
            bundles: nsis
            artifact_name: windows-desktop-bundle
            artifact_paths: |
              apps/desktop/src-tauri/target/release/bundle/nsis/*
          - name: linux
            os: ubuntu-22.04
            artifact_name: linux-desktop-bundle
            artifact_paths: |
              apps/desktop/src-tauri/target/release/bundle/deb/*

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          repo_version="$(tr -d '\r\n' < VERSION)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$repo_version" != "$tag_version" ]]; then
            echo "VERSION ($repo_version) does not match tag ($GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop Python runtime
        run: pnpm --filter @card-reader/desktop run build:python

      - name: Build Windows desktop bundle
        if: runner.os == 'Windows'
        run: pnpm --filter @card-reader/desktop exec tauri build --bundles nsis --verbose

      - name: Build Linux Debian bundle
        if: runner.os == 'Linux'
        env:
          RUST_BACKTRACE: 1
        run: pnpm --filter @card-reader/desktop exec tauri build --bundles deb --verbose

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_paths }}

  publish-release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: desktop
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: "*-desktop-bundle"
          merge-multiple: true
          path: release-assets

      - name: Keep executable artifacts only
        run: |
          find release-assets -type f \
            ! -name "*.exe" \
            ! -name "*.deb" \
            -delete

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          generateReleaseNotes: true
          artifacts: "release-assets/**"
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
