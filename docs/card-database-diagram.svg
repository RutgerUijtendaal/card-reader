  <path class="line" d="M570 973 C650 920, 710 840, 745 745"/>

  <path class="line" d="M975 650 L1125 535"/>
  <text class="label" x="1015" y="575">versions</text>
  <path class="soft" d="M1125 595 C1048 645, 1040 725, 975 745"/>
